<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oracle 어드민</title>
<style>
  :root{
    --paper:#FAF9F6; --ink:#161411; --gray:#9A948A; --faint:#C9C4BA;
    --hair:#E5E2DA; --mat:#fff; --vermilion:#BC4B33; --soft:#211E19;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,'Pretendard',system-ui,sans-serif;font-size:14px;line-height:1.5}
  header{padding:18px 24px;border-bottom:1px solid var(--hair);display:flex;
    align-items:baseline;gap:14px;position:sticky;top:0;background:var(--paper);z-index:5}
  header h1{font-size:18px;margin:0;font-weight:600;letter-spacing:-.3px}
  header .sub{color:var(--gray);font-size:12px}
  .wrap{display:flex;min-height:calc(100vh - 59px)}
  nav{width:200px;border-right:1px solid var(--hair);padding:16px 0;flex-shrink:0}
  nav a{display:flex;justify-content:space-between;padding:9px 24px;cursor:pointer;
    color:var(--soft);text-decoration:none;border-left:2px solid transparent}
  nav a:hover{background:#F2F0EB}
  nav a.active{border-left-color:var(--vermilion);color:var(--ink);font-weight:600;background:#F2F0EB}
  nav a .n{color:var(--faint);font-size:12px;font-variant-numeric:tabular-nums}
  main{flex:1;padding:20px 24px;overflow:auto}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .bar h2{font-size:15px;margin:0;font-weight:600}
  .bar .total{color:var(--gray);font-size:12px}
  input[type=search]{flex:1;min-width:120px;max-width:280px;padding:7px 11px;
    border:1px solid var(--hair);border-radius:7px;background:var(--mat);font-size:13px}
  button{font-family:inherit;font-size:12.5px;padding:6px 12px;border:1px solid var(--hair);
    background:var(--mat);border-radius:7px;cursor:pointer;color:var(--soft)}
  button:hover{border-color:var(--gray)}
  button.danger{color:var(--vermilion);border-color:#E8D5CF}
  button.danger:hover{background:#FBF1EE}
  button.accent{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .doc{border:1px solid var(--hair);border-radius:9px;background:var(--mat);
    margin-bottom:10px;overflow:hidden}
  .doc .head{display:flex;justify-content:space-between;align-items:center;
    padding:10px 14px;cursor:pointer;gap:10px}
  .doc .head:hover{background:#FCFBF9}
  .doc .id{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--gray);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .doc .summary{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--soft)}
  .doc .when{color:var(--faint);font-size:11.5px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .doc pre{margin:0;padding:12px 14px;border-top:1px solid var(--hair);background:#FCFBF9;
    font-family:ui-monospace,monospace;font-size:11.5px;line-height:1.55;
    white-space:pre-wrap;word-break:break-word;max-height:420px;overflow:auto}
  .doc .actions{padding:8px 14px;border-top:1px solid var(--hair);text-align:right}
  .thumb{width:40px;height:40px;object-fit:cover;border-radius:5px;border:1px solid var(--hair)}
  .empty{color:var(--gray);padding:40px 0;text-align:center}
  .more{display:block;margin:14px auto;}
  .flag{display:inline-block;padding:1px 7px;border-radius:99px;font-size:11px;
    background:#F2EFEA;color:var(--gray);margin-left:6px}
  .flag.otp{background:#FBF1EE;color:var(--vermilion)}
  .pf{border:1px solid var(--hair);border-radius:9px;background:var(--mat);padding:14px;margin-bottom:14px}
  .pf label{display:block;font-size:13px;font-weight:600;margin-bottom:8px}
  .pf textarea{width:100%;min-height:90px;padding:10px;border:1px solid var(--hair);
    border-radius:7px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;
    resize:vertical;background:#FCFBF9;color:var(--ink)}
  .pf .row{margin-top:8px;display:flex;gap:8px;align-items:center}
  .pf .row .hint{color:var(--gray);font-size:11.5px;margin-left:auto}
</style>
</head>
<body>
<header>
  <h1>Oracle 어드민</h1>
  <span class="sub" id="sub">로딩…</span>
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"><div class="empty">컬렉션을 선택하세요</div></main>
</div>
<script>
const $ = s => document.querySelector(s);
let CUR = null, SKIP = 0, Q = '';

async function api(path, opts){
  const r = await fetch('/admin/api' + path, opts);
  if(!r.ok) throw new Error(r.status + ' ' + await r.text());
  return r.status === 204 ? null : r.json();
}

async function loadStats(){
  const s = await api('/stats');
  const total = s.collections.reduce((a,c)=>a+c.count,0);
  $('#sub').textContent = total + ' docs · ' + s.collections.length + ' collections';
  $('#nav').innerHTML = s.collections.map(c =>
    `<a data-c="${c.name}" class="${c.name===CUR?'active':''}">
       <span>${c.label}</span><span class="n">${c.count}</span></a>`).join('') +
    (s.unbriefed_signals > 0
      ? `<div style="padding:14px 24px;margin-top:8px;border-top:1px solid var(--hair)">
           <div style="font-size:12px;color:var(--gray);margin-bottom:8px">
             미요약 신호 ${s.unbriefed_signals}건</div>
           <button class="accent" onclick="rebrief(this)">지금 요약</button></div>`
      : '');
  $('#nav').innerHTML += `<a data-c="__personas__" class="${CUR==='__personas__'?'active':''}"
    style="border-top:1px solid var(--hair);margin-top:6px;padding-top:14px">
    <span>⚙ 페르소나</span></a>`;
  $('#nav').innerHTML += `<a data-c="__excludes__" class="${CUR==='__excludes__'?'active':''}">
    <span>🔕 신호 제외</span></a>`;
  $('#nav').innerHTML += `<a data-c="__models__" class="${CUR==='__models__'?'active':''}">
    <span>🧠 모델 설정</span></a>`;
  $('#nav').innerHTML += `<a data-c="__companion__" class="${CUR==='__companion__'?'active':''}">
    <span>🐾 말 걸기</span></a>`;
  $('#nav').innerHTML += `<a data-c="__places__" class="${CUR==='__places__'?'active':''}">
    <span>📍 장소</span></a>`;
  $('#nav').innerHTML += `<a data-c="__collector__" class="${CUR==='__collector__'?'active':''}">
    <span>📡 수집기</span></a>`;
  $('#nav').innerHTML += `<a data-c="__dismissed__" class="${CUR==='__dismissed__'?'active':''}">
    <span>🗂 확인한 항목</span></a>`;
  document.querySelectorAll('nav a').forEach(a =>
    a.onclick = () => { CUR=a.dataset.c; SKIP=0; Q=''; render(); });
}

async function rebrief(btn){
  btn.disabled = true; btn.textContent = '요약 중…';
  try{
    const r = await api('/signals/rebrief', {method:'POST'});
    alert(`${r.briefed}건 요약 완료\n\n${r.summary || '(요약 없음)'}`);
    await loadStats(); if(CUR) render();
  }catch(e){ alert('실패: '+e.message); }
  btn.disabled = false; btn.textContent = '지금 요약';
}

function fmtWhen(d){
  if(!d) return '';
  const t = new Date(d);
  return isNaN(t) ? '' : t.toLocaleString('ko',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function summarize(doc){
  return doc.user_comment || doc.summary || doc.text || doc.body ||
    (doc.insight && doc.insight.text) || doc.date || doc.label || '—';
}

async function render(){
  document.querySelectorAll('nav a').forEach(a =>
    a.classList.toggle('active', a.dataset.c===CUR));
  if(CUR==='__personas__') return renderPersonas();
  if(CUR==='__excludes__') return renderExcludes();
  if(CUR==='__models__') return renderModels();
  if(CUR==='__companion__') return renderCompanion();
  if(CUR==='__places__') return renderPlaces();
  if(CUR==='__collector__') return renderCollector();
  if(CUR==='__dismissed__') return renderDismissed();
  const m = $('#main');
  m.innerHTML = '<div class="empty">로딩…</div>';
  let data;
  try{ data = await api(`/collection/${CUR}?limit=50&skip=${SKIP}&q=${encodeURIComponent(Q)}`); }
  catch(e){ m.innerHTML = `<div class="empty">실패: ${e.message}</div>`; return; }

  const bar = `<div class="bar">
    <h2>${CUR}</h2><span class="total">${data.total}건</span>
    <input type="search" placeholder="검색 (_id·본문·요약·발신인)" value="${Q}"
      onkeydown="if(event.key==='Enter'){Q=this.value;SKIP=0;render()}">
  </div>`;

  if(!data.docs.length){ m.innerHTML = bar + '<div class="empty">문서 없음</div>'; return; }

  const rows = data.docs.map(d => {
    const id = d._id;
    const when = fmtWhen(d.ts || d.period_start || d.last_ts);
    const otp = d.otp ? '<span class="flag otp">OTP</span>' : '';
    const briefed = (CUR==='signals' && d.briefed===false) ? '<span class="flag">미요약</span>' : '';
    return `<div class="doc" data-id="${id}">
      <div class="head" onclick="toggle(this)">
        <span class="summary">${esc(summarize(d))}${otp}${briefed}</span>
        <span class="when">${when}</span>
      </div>
      <div class="body" hidden>
        <pre>${esc(JSON.stringify(d,null,2))}</pre>
        <div class="actions">
          <span class="id">${id}</span>
          <button class="danger" onclick="del('${id}',event)">삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const shown = SKIP + data.docs.length;
  const nav = [];
  if(SKIP > 0) nav.push(`<button onclick="SKIP=Math.max(0,SKIP-50);render()">← 이전</button>`);
  if(shown < data.total) nav.push(`<button onclick="SKIP+=50;render()">다음 →</button>`);
  const more = nav.length
    ? `<div style="text-align:center;margin:16px 0;color:var(--gray);font-size:12px">
         ${SKIP+1}–${shown} / ${data.total} &nbsp; ${nav.join(' ')}</div>` : '';
  m.innerHTML = bar + rows + more;
}

function toggle(head){
  const b = head.parentElement.querySelector('.body');
  b.hidden = !b.hidden;
}

async function renderPersonas(){
  const m = $('#main');
  m.innerHTML = '<div class="empty">로딩…</div>';
  let d;
  try{ d = await api('/personas'); }
  catch(e){ m.innerHTML = `<div class="empty">실패: ${e.message}</div>`; return; }
  m.innerHTML = `<div class="bar"><h2>페르소나</h2>
    <span class="total">베르(메인)·쿠키(서브) 말투·역할 · 저장 후 5초 내 반영</span></div>` +
    d.fields.map(f => `
      <div class="pf">
        <label>${f.label} ${f.overridden?'<span class="flag">수정됨</span>':''}</label>
        <textarea data-key="${f.key}">${esc(f.value)}</textarea>
        <div class="row">
          <button class="accent" onclick="savePersona('${f.key}',this)">저장</button>
          ${f.overridden?`<button onclick="resetPersona('${f.key}')">디폴트로</button>`:''}
          <span class="hint">${f.key}</span>
        </div>
      </div>`).join('');
}

async function savePersona(key, btn){
  const ta = btn.closest('.pf').querySelector('textarea');
  btn.disabled = true;
  try{
    await api('/personas', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key, value: ta.value})});
    renderPersonas();
  }catch(e){ alert('저장 실패: '+e.message); btn.disabled=false; }
}

async function resetPersona(key){
  if(!confirm('디폴트로 되돌릴까요?')) return;
  try{
    await api('/personas', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key, value: ''})});
    renderPersonas();
  }catch(e){ alert('실패: '+e.message); }
}

async function renderExcludes(){
  const m = $('#main');
  m.innerHTML = '<div class="empty">로딩…</div>';
  let d;
  try{ d = await api('/signal-excludes'); }
  catch(e){ m.innerHTML = `<div class="empty">실패: ${e.message}</div>`; return; }
  m.innerHTML = `<div class="bar"><h2>신호 제외</h2>
    <span class="total">발신자·앱·내용에 아래 문구가 포함되면 요약에서 제외 · 한 줄에 하나 · 원본은 남음</span></div>
    <div class="pf">
      <label>제외 패턴 (부분일치, 대소문자 무시)</label>
      <textarea id="exTa" style="min-height:220px"
        placeholder="예)&#10;CBC Maintenance&#10;세션 자동 종료&#10;광고">${esc((d.patterns||[]).join('\n'))}</textarea>
      <div class="row">
        <button class="accent" onclick="saveExcludes(this)">저장</button>
        <span class="hint">다음 요약부터 적용</span>
      </div>
    </div>`;
}

async function saveExcludes(btn){
  const ta = document.getElementById('exTa');
  const patterns = ta.value.split('\n').map(s => s.trim()).filter(Boolean);
  btn.disabled = true;
  try{
    await api('/signal-excludes', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({patterns})});
    btn.textContent = '저장됨 ✓';
    setTimeout(() => { btn.textContent = '저장'; btn.disabled = false; }, 1200);
  }catch(e){ alert('저장 실패: '+e.message); btn.disabled = false; }
}

async function renderModels(){
  const m = $('#main');
  m.innerHTML = '<div class="empty">로딩…</div>';
  let d;
  try{ d = await api('/task-aliases'); }
  catch(e){ m.innerHTML = `<div class="empty">실패: ${e.message}</div>`; return; }
  const sel = (val) => '<option value="">(env 디폴트)</option>' +
    d.models.map(a => `<option value="${esc(a)}" ${a===val?'selected':''}>${esc(a)}</option>`).join('');
  m.innerHTML = `<div class="bar"><h2>모델 설정</h2>
    <span class="total">용도별 Nest 모델 — 저장 후 5초 내 반영 · 비우면 env 디폴트</span></div>` +
    d.fields.map(f => `
      <div class="pf">
        <label>${f.label} <span class="hint">${f.key}</span></label>
        <select style="width:100%;padding:9px;border:1px solid var(--hair);font:inherit;background:var(--paper)"
          onchange="saveTaskAlias('${f.key}', this.value)">${sel(f.value)}</select>
        <div class="hint" style="margin-top:4px">실제 적용: ${esc(f.effective) || '(자동 — Nest 첫 모델)'}</div>
      </div>`).join('');
}

async function saveTaskAlias(key, value){
  try{
    await api('/task-aliases', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key, value})});
    renderModels();
  }catch(e){ alert('저장 실패: '+e.message); }
}

// ── 동반자 말 걸기 설정 ───────────────────────────────────────
function numField(key, val, label, suffix){
  return `<label style="display:flex;align-items:center;gap:8px;font-weight:400;margin:0">
    <span style="min-width:96px">${label}</span>
    <input type="number" min="0" data-k="${key}" value="${val}"
      style="width:74px;padding:6px 8px;border:1px solid var(--hair);border-radius:6px;font:inherit">
    <span class="hint" style="margin:0">${suffix||''}</span></label>`;
}
function chkField(key, on, label){
  return `<label style="display:inline-flex;align-items:center;gap:6px;font-weight:400;margin:0 14px 8px 0">
    <input type="checkbox" data-k="${key}" ${on?'checked':''}> ${label}</label>`;
}

async function renderCompanion(){
  const m = $('#main');
  m.innerHTML = '<div class="empty">로딩…</div>';
  let d;
  try{ d = await api('/companion-config'); }
  catch(e){ m.innerHTML = `<div class="empty">실패: ${e.message}</div>`; return; }
  const c = d.config, ev = c.location_events||{}, labels = d.event_labels||{}, st = d.state||{};
  const evRows = Object.keys(labels).map(k =>
    chkField('ev:'+k, ev[k]!==false, esc(labels[k]))).join('');
  const ago = (v) => v==null ? '아직 없음' : (v+'분 전');
  m.innerHTML = `<div class="bar"><h2>말 걸기</h2>
      <span class="total">쿠키·베르가 먼저 거는 한마디 — 텀·시간대·새벽 정지·위치 조건 · 저장 후 5초 내 반영</span></div>
    <div class="pf">
      ${chkField('enabled', c.enabled!==false, '<b>전체 켜기</b> (끄면 일절 안 걺)')}
    </div>
    <div class="pf">
      <label>새벽 조용 구간 — 이 시간엔 정기·위치 모두 침묵</label>
      <div class="row" style="gap:6px">
        ${numField('quiet_start_hour', c.quiet_start_hour, '시작', '시')}
        ${numField('quiet_end_hour', c.quiet_end_hour, '끝', '시 (예: 23~8)')}
      </div>
    </div>
    <div class="pf">
      <label>정시 체크인 — '뭐해?' (매시 0분에 1회, 위치와 완전 별개·GPS 안 봄)</label>
      ${chkField('checkin_enabled', c.checkin_enabled!==false, '켜기')}
      <div class="row" style="margin-top:4px;gap:6px">
        ${numField('checkin_start_hour', c.checkin_start_hour, '활동 시작', '시')}
        ${numField('checkin_end_hour', c.checkin_end_hour, '활동 끝', '시')}
      </div>
      <div class="hint" style="margin-top:6px">활동 시간대의 매 정시에 한 번 · 마지막: ${ago(st.checkin_ago_min)}</div>
    </div>
    <div class="pf">
      <label>위치 이벤트에 말 걸기 — 저장된 장소 도착/나섬
        <span class="hint">위치를 어떻게 확인할지는 📍 장소 탭에서</span></label>
      ${chkField('location_enabled', c.location_enabled!==false, '켜기')}
      <div class="row" style="margin-top:4px">${numField('location_cooldown_min', c.location_cooldown_min, '최소 간격', '분')}</div>
      <div style="margin-top:10px">${evRows}</div>
      <div class="hint" style="margin-top:6px">마지막 위치: ${ago(st.location_ago_min)}</div>
    </div>
    <div class="pf" style="border:none;background:none;padding:0">
      <button class="accent" onclick="saveCompanion(this)">저장</button>
    </div>`;
}

async function saveCompanion(btn){
  const patch = {location_events:{}};
  document.querySelectorAll('[data-k]').forEach(el => {
    const k = el.dataset.k;
    if(k.startsWith('ev:')){ patch.location_events[k.slice(3)] = el.checked; return; }
    if(el.type==='checkbox') patch[k] = el.checked;
    else patch[k] = Number(el.value);
  });
  btn.disabled = true;
  try{
    await api('/companion-config', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(patch)});
    btn.textContent = '저장됨 ✓';
    setTimeout(() => { btn.textContent='저장'; btn.disabled=false; }, 1200);
  }catch(e){ alert('저장 실패: '+e.message); btn.disabled=false; }
}

// ── 장소 (집·작업실·자주 가는 곳) ─ /places 직접 호출(폰과 공용 API) ──
const KIND_LABEL = {home:'집', office:'작업실', place:'장소'};
async function places(path, opts){
  const r = await fetch('/places' + (path||''), opts);
  if(!r.ok) throw new Error(r.status + ' ' + await r.text());
  return r.json();
}
async function locCfg(opts){
  const r = await fetch('/location-config', opts);
  if(!r.ok) throw new Error(r.status + ' ' + await r.text());
  return r.json();
}
async function collStatus(){
  const r = await fetch('/collector-status');
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
const inStyle = 'width:100%;padding:8px 10px;border:1px solid var(--hair);border-radius:7px;font:inherit;background:#FCFBF9;margin-bottom:8px';

async function renderPlaces(){
  const m = $('#main');
  m.innerHTML = '<div class="empty">로딩…</div>';
  let d, lc, st=null;
  try{ d = await places(); lc = (await locCfg()).config; }
  catch(e){ m.innerHTML = `<div class="empty">실패: ${e.message}</div>`; return; }
  try{ st = await collStatus(); }catch(e){}   // 라이브 상태(graceful — 보고 없으면 패널만 빈 채)
  const items = d.items || [];

  // 📡 수집기 현재 상태 — 현재 WiFi·위치·차 BT + 최근 로그 (운전 중 adb logcat 대체).
  const curWifi = (st && st.wifi) ? st.wifi : '';
  const place = st ? (st.visit_on && st.place ? esc(st.place)
                      : (st.visit_on ? '어딘가 체류 중' : '이동 중 / 미확정')) : '';
  const logBox = (st && st.logs && st.logs.length)
    ? `<div style="background:#1c1b19;color:#d8d4cc;font:11px/1.55 ui-monospace,SFMono-Regular,monospace;padding:8px 10px;border-radius:7px;max-height:220px;overflow:auto;white-space:pre-wrap">${st.logs.slice(-50).reverse().map(esc).join('\n')}</div>`
    : '<div class="hint">최근 로그 없음 — 이동·BT 등 이벤트가 생기면 여기 쌓여요</div>';
  const fresh = st ? (st.age_sec!=null ? st.age_sec+'초 전 보고' : '보고 시각 미상')
                   : '아직 보고 없음 — 새 수집기 설치 후 1분 내 뜸';
  const status = `<div class="pf">
    <label>📡 수집기 현재 상태 <span class="hint">${fresh}</span></label>
    ${st ? `<div class="hint" style="margin-bottom:8px;line-height:1.8">
      현재 WiFi: <b>${curWifi?esc(curWifi):'(연결 없음/미상)'}</b><br>
      위치: <b>${place}</b> · 차 BT: <b>${st.bt?esc(st.bt)+' 연결됨':'끊김'}</b></div>` : ''}
    ${logBox}
    <div class="row" style="margin-top:6px"><button onclick="renderPlaces()">새로고침 ↻</button></div>
  </div>`;

  // 위치 확인(센싱) 설정 — 말 걸기와 분리. '어떻게 위치를 확인할지'.
  const sensing = `<div class="pf">
    <label>위치 확인 <span class="hint">폰이 어떻게 위치를 알아낼지 (말 걸기와 별개)</span></label>
    ${numField('poll_interval_sec', lc.poll_interval_sec, '확인 주기', '초')}
    ${chkField('skip_on_known_wifi', lc.skip_on_known_wifi!==false, '등록된 WiFi에 물려 있으면 GPS 스킵(배터리 절약)')}
    <div class="row" style="margin-top:6px"><button class="accent" onclick="saveSensing(this)">위치 확인 저장</button></div>
  </div>`;
  const coords = p => (p.lat!=null && p.lng!=null) ? `${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}` : '좌표 없음(폰에서 추가)';
  const add = `<div class="pf">
    <label>장소 추가 <span class="hint">새 장소를 직접 추가 (집·작업실 WiFi는 아래 각 장소에서 바로 수정)</span></label>
    <input id="npName" placeholder="이름 (예: 단골 카페)" style="${inStyle}">
    <input id="npWifi" placeholder="WiFi 이름(SSID) — 선택" style="${inStyle}">
    <input id="npBt" placeholder="블루투스 기기명 (예: 차량오디오) — 연결되면 그 장소로 · 선택" style="${inStyle}">
    <textarea id="npDesc" placeholder="설명 — 동반자가 맥락으로 씀 (예: 주말마다 작업하는 조용한 곳)"
      style="${inStyle};min-height:56px;font-family:inherit"></textarea>
    <div class="row"><button class="accent" onclick="addPlace(this)">추가</button></div>
  </div>`;
  const rows = items.length ? items.map(p => `
    <div class="pf" data-id="${p.id}" data-name="${esc(p.name)}">
      <label>${KIND_LABEL[p.kind]||p.kind} · ${esc(p.name)} <span class="hint">${coords(p)}</span></label>
      <input data-wifi value="${esc(p.wifi||'')}" placeholder="WiFi 이름(SSID)" style="${inStyle}">
      <input data-bt value="${esc(p.bt||'')}" placeholder="블루투스 기기명 (차 등) — 선택" style="${inStyle}">
      <textarea data-desc placeholder="설명 (동반자 맥락)"
        style="${inStyle};min-height:52px;font-family:inherit">${esc(p.description||'')}</textarea>
      <div class="row">
        <button class="accent" onclick="savePlace('${p.id}', this)">저장</button>
        ${curWifi ? `<button data-wc="${esc(curWifi)}" onclick="registerWifi('${p.id}', this)">현재 WiFi 등록</button>` : ''}
        <button class="danger" onclick="delPlace('${p.id}')">삭제</button>
      </div>
    </div>`).join('')
    : '<div class="empty">아직 등록된 장소가 없어요 — 위에서 추가하세요</div>';
  m.innerHTML = `<div class="bar"><h2>장소</h2>
    <span class="total">수집기 상태 + 위치 확인 설정 + 등록된 장소(WiFi·BT·설명 직접 수정)</span></div>`
    + status + sensing + add + rows;
}

async function saveSensing(btn){
  const patch = {};
  document.querySelectorAll('[data-k]').forEach(el => {
    const k = el.dataset.k;
    if(!['poll_interval_sec','skip_on_known_wifi'].includes(k)) return;
    patch[k] = el.type==='checkbox' ? el.checked : Number(el.value);
  });
  btn.disabled = true;
  try{
    await locCfg({method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(patch)});
    btn.textContent = '저장됨 ✓';
    setTimeout(() => { btn.textContent='위치 확인 저장'; btn.disabled=false; }, 1200);
  }catch(e){ alert('저장 실패: '+e.message); btn.disabled=false; }
}

async function addPlace(btn){
  const name = document.getElementById('npName').value.trim();
  if(!name){ alert('이름을 적어주세요'); return; }
  const wifi = document.getElementById('npWifi').value.trim();
  const bt = document.getElementById('npBt').value.trim();
  const description = document.getElementById('npDesc').value;
  btn.disabled = true;
  try{
    await places('', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, wifi: wifi||null, bt: bt||null, description, kind:'place'})});
    renderPlaces();
  }catch(e){ alert('추가 실패: '+e.message); btn.disabled=false; }
}

async function savePlace(id, btn){
  const pf = btn.closest('.pf');
  const name = pf.dataset.name;
  const description = pf.querySelector('[data-desc]').value;
  // WiFi·BT는 빈 문자열로 보내면 해제(서버 ''→None), 값 있으면 설정. (입력칸은 현재값 프리필)
  const wifi = (pf.querySelector('[data-wifi]')||{value:''}).value.trim();
  const bt = (pf.querySelector('[data-bt]')||{value:''}).value.trim();
  btn.disabled = true;
  try{
    await places('', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id, name, description, wifi, bt})});
    btn.textContent = '저장됨 ✓';
    setTimeout(() => { btn.textContent='저장'; btn.disabled=false; }, 1200);
  }catch(e){ alert('저장 실패: '+e.message); btn.disabled=false; }
}

// 수집기가 보고한 '현재 WiFi'를 이 장소에 한 번에 등록(집·작업실 WiFi 빠른 지정).
async function registerWifi(id, btn){
  const wifi = btn.dataset.wc;
  if(!wifi) return;
  const pf = btn.closest('.pf');
  if(!confirm('현재 WiFi "'+wifi+'"를 \''+pf.dataset.name+'\'에 등록할까요?')) return;
  btn.disabled = true;
  try{
    await places('', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id, name: pf.dataset.name, wifi})});
    renderPlaces();
  }catch(e){ alert('등록 실패: '+e.message); btn.disabled=false; }
}

async function delPlace(id){
  if(!confirm('이 장소를 삭제할까요?')) return;
  try{ await places('/'+encodeURIComponent(id), {method:'DELETE'}); renderPlaces(); }
  catch(e){ alert('삭제 실패: '+e.message); }
}

// ── 확인한 항목 (dismiss된 데스크 항목 — 검토·되돌리기) ──
const DCAT = {action_needed:'당장처리', attention:'관심', acquaintance:'지인', low:'일반', spam:'스팸'};
async function renderDismissed(){
  const m = $('#main');
  m.innerHTML = '<div class="empty">로딩…</div>';
  let d;
  try{ const r = await fetch('/dashboard/dismissed'); if(!r.ok) throw new Error(r.status); d = await r.json(); }
  catch(e){ m.innerHTML = `<div class="empty">실패: ${e.message}</div>`; return; }
  const items = d.items || [];
  const rows = items.length ? items.map(it => `
    <div class="pf" data-key="${esc(it.key)}">
      <div class="hint" style="margin-bottom:4px">
        ${fmtWhen(it.dismissed_at)} 확인${it.category?(' · '+(DCAT[it.category]||it.category)):''}</div>
      <div style="margin-bottom:6px">${it.sender?('<b>'+esc(it.sender)+'</b> '):''}${esc(it.summary||'')}</div>
      <div class="row"><button class="accent" onclick="undismiss(this)">되돌리기</button></div>
    </div>`).join('')
    : '<div class="empty">확인 처리한 항목이 없어요</div>';
  m.innerHTML = `<div class="bar"><h2>확인한 항목</h2>
    <span class="total">${items.length}건 — 되돌리면 데스크 '당장 처리'에 다시 떠요</span></div>` + rows;
}
async function undismiss(btn){
  const pf = btn.closest('.pf');
  const key = pf.dataset.key;
  btn.disabled = true;
  try{
    await fetch('/dashboard/undismiss', {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify({key})});
    pf.style.opacity = 0.45;
    btn.textContent = '되돌림 ✓ — 데스크에 다시 뜸';
  }catch(e){ alert('실패: '+e.message); btn.disabled=false; }
}

// ── 수집기 설정 (Android 네이티브 수집기가 매 사이클 fetch해 적용) ──
async function collCfg(opts){
  const r = await fetch('/collector-config', opts);
  if(!r.ok) throw new Error(r.status + ' ' + await r.text());
  return r.json();
}
async function renderCollector(){
  const m = $('#main');
  m.innerHTML = '<div class="empty">로딩…</div>';
  let c;
  try{ c = (await collCfg()).config; }
  catch(e){ m.innerHTML = `<div class="empty">실패: ${e.message}</div>`; return; }
  m.innerHTML = `<div class="bar"><h2>수집기</h2>
      <span class="total">Android 네이티브 수집기 — 매 사이클 이 설정을 받아 적용 · 앱 알림·문자·통화</span></div>
    <div class="pf">
      ${chkField('enabled', c.enabled!==false, '<b>전체 켜기</b> (끄면 수집기가 전송 안 함)')}
    </div>
    <div class="pf">
      <label>수집 텀</label>
      ${numField('sync_interval_min', c.sync_interval_min, '주기', '분')}
    </div>
    <div class="pf">
      <label>무엇을 수집할지</label>
      ${chkField('collect_notifications', c.collect_notifications!==false, '앱 알림')}
      ${chkField('collect_sms', c.collect_sms!==false, '문자(SMS)')}
      ${chkField('collect_calls', c.collect_calls!==false, '부재중 통화')}
      ${chkField('collect_location', c.collect_location!==false, '위치(GPS/WiFi/BT 체류·방문·도착말걸기)')}
    </div>
    <div class="pf" style="border:none;background:none;padding:0">
      <button class="accent" onclick="saveCollector(this)">저장</button>
    </div>`;
}
async function saveCollector(btn){
  const keys = ['enabled','sync_interval_min','collect_sms','collect_calls','collect_notifications','collect_location'];
  const patch = {};
  document.querySelectorAll('[data-k]').forEach(el => {
    const k = el.dataset.k;
    if(!keys.includes(k)) return;
    patch[k] = el.type==='checkbox' ? el.checked : Number(el.value);
  });
  btn.disabled = true;
  try{
    await collCfg({method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(patch)});
    btn.textContent='저장됨 ✓';
    setTimeout(()=>{ btn.textContent='저장'; btn.disabled=false; }, 1200);
  }catch(e){ alert('저장 실패: '+e.message); btn.disabled=false; }
}

function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function del(id, ev){
  ev.stopPropagation();
  if(!confirm(`삭제할까요?\n${id}`)) return;
  try{ await api(`/collection/${CUR}/${encodeURIComponent(id)}`, {method:'DELETE'});
    await loadStats(); render(); }
  catch(e){ alert('삭제 실패: '+e.message); }
}

loadStats();
</script>
</body>
</html>

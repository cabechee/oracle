<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oracle 어드민</title>
<style>
  :root{
    --paper:#FAF9F6; --ink:#1A1714; --gray:#8E887C; --faint:#BDB7AC;
    --hair:#E7E3DB; --mat:#FFFFFF; --vermilion:#BC4B33; --soft:#26221C;
    --hi:#F2F0EA; --shadow:0 1px 2px rgba(30,24,16,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font:14px/1.5 -apple-system,'Pretendard',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  /* ── 레이아웃 ── */
  .app{display:grid;grid-template-columns:214px 1fr;min-height:100vh}
  aside{border-right:1px solid var(--hair);position:sticky;top:0;height:100vh;overflow:auto;padding:14px 0}
  .brand{padding:4px 18px 12px;display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:15px;letter-spacing:-.3px}
  .brand i{font-size:11px;color:var(--gray);font-style:normal}
  .grp{margin:13px 0 3px;padding:0 20px;font-size:10.5px;letter-spacing:.07em;color:var(--faint);font-weight:700}
  .navi{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:1px 8px;
    padding:7px 12px;border-radius:8px;cursor:pointer;color:var(--soft);font-size:13.5px}
  .navi:hover{background:var(--hi)}
  .navi.on{background:var(--ink);color:var(--paper);font-weight:600}
  .navi .c{color:var(--faint);font-size:11.5px;font-variant-numeric:tabular-nums}
  .navi.on .c{color:var(--paper);opacity:.65}
  main{min-width:0;display:flex;flex-direction:column}
  .top{position:sticky;top:0;z-index:5;background:var(--paper);border-bottom:1px solid var(--hair);
    padding:13px 26px;display:flex;align-items:center;gap:14px}
  .crumb{font-size:12.5px;color:var(--gray);display:flex;align-items:baseline;gap:7px}
  .crumb b{color:var(--ink);font-weight:600;font-size:15.5px;letter-spacing:-.2px}
  .gsearch{margin-left:auto;flex:0 1 270px}
  .gsearch input{width:100%;padding:7px 12px;border:1px solid var(--hair);border-radius:8px;background:var(--mat);font:inherit;font-size:13px}
  .body{padding:22px 26px;max-width:940px;width:100%}
  /* ── 공통 컴포넌트 ── */
  .bar{display:flex;gap:10px;align-items:baseline;margin-bottom:14px;flex-wrap:wrap}
  .bar h2{font-size:15px;margin:0;font-weight:600;letter-spacing:-.2px}
  .bar .total{color:var(--gray);font-size:12px}
  input[type=search]{flex:1;min-width:120px;max-width:280px;padding:7px 11px;
    border:1px solid var(--hair);border-radius:8px;background:var(--mat);font-size:13px}
  button{font:inherit;font-size:12.5px;padding:6px 12px;border:1px solid var(--hair);
    background:var(--mat);border-radius:8px;cursor:pointer;color:var(--soft)}
  button:hover{border-color:var(--gray)}
  button:disabled{opacity:.5;cursor:default}
  button.danger{color:var(--vermilion);border-color:#E8D5CF}
  button.danger:hover{background:#FBF1EE}
  button.accent{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  select{font:inherit;padding:8px;border:1px solid var(--hair);border-radius:7px;background:var(--mat)}
  .pf{border:1px solid var(--hair);border-radius:11px;background:var(--mat);padding:15px;margin-bottom:13px;box-shadow:var(--shadow)}
  .pf label{display:block;font-size:13px;font-weight:600;margin-bottom:8px}
  .pf textarea{width:100%;min-height:90px;padding:10px;border:1px solid var(--hair);
    border-radius:8px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;resize:vertical;background:#FCFBF9;color:var(--ink)}
  .pf .row{margin-top:8px;display:flex;gap:8px;align-items:center}
  .pf .row .hint{color:var(--gray);font-size:11.5px;margin-left:auto}
  .hint{color:var(--gray);font-size:11.5px}
  .doc{border:1px solid var(--hair);border-radius:10px;background:var(--mat);margin-bottom:9px;overflow:hidden;box-shadow:var(--shadow)}
  .doc .head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;gap:10px}
  .doc .head:hover{background:#FCFBF9}
  .doc .summary{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--soft)}
  .doc .when{color:var(--faint);font-size:11.5px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .doc .id{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--gray)}
  .doc pre{margin:0;padding:12px 14px;border-top:1px solid var(--hair);background:#FCFBF9;
    font-family:ui-monospace,monospace;font-size:11.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;max-height:420px;overflow:auto}
  .doc .actions{padding:8px 14px;border-top:1px solid var(--hair);text-align:right}
  .flag{display:inline-block;padding:1px 7px;border-radius:99px;font-size:11px;background:#F2EFEA;color:var(--gray);margin-left:6px}
  .flag.otp{background:#FBF1EE;color:var(--vermilion)}
  .empty{color:var(--gray);padding:46px 0;text-align:center}
  .thumb{width:40px;height:40px;object-fit:cover;border-radius:5px;border:1px solid var(--hair)}
  /* 탭 (통합 페이지) */
  .tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--hair)}
  .tab{padding:8px 15px;cursor:pointer;font-size:13.5px;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--soft)}
  .tab.on{color:var(--ink);font-weight:600;border-bottom-color:var(--vermilion)}
  /* 홈 카드 */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(216px,1fr));gap:13px}
  .hc{border:1px solid var(--hair);border-radius:12px;background:var(--mat);padding:15px 16px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .12s}
  .hc:hover{border-color:var(--gray)}
  .hc .t{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:6px;margin-bottom:9px}
  .hc .kpi{font-size:23px;font-weight:600;letter-spacing:-.6px}
  .hc .sub{font-size:12px;color:var(--gray);margin-top:5px;line-height:1.55}
  .hc ul{margin:6px 0 0;padding-left:0;list-style:none}
  .hc li{font-size:12.5px;padding:2px 0;color:var(--soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><b>Oracle</b><i id="brandsub">어드민</i></div>
    <div id="nav"></div>
  </aside>
  <main>
    <div class="top">
      <div class="crumb" id="crumb"><b>홈</b></div>
      <div class="gsearch"><input id="gsearch" placeholder="기록·신호 검색 (Enter)"
        onkeydown="if(event.key==='Enter'){go('col:records');setTimeout(()=>{Q=this.value;SKIP=0;render()},0)}"></div>
    </div>
    <div class="body"><div id="main"><div class="empty">로딩…</div></div></div>
  </main>
</div>
<script>
const $ = s => document.querySelector(s);
let CUR='__home__', SKIP=0, Q='', STATS=null;

// ── 네비게이션 모델 (그룹) ──
const KNOWN = {records:'📸 캡처', signals:'📨 신호', journals:'📓 저널', conversations:'💬 대화'};
const NAV = [
  {grp:null,   items:[{id:'__home__', label:'🏠 홈'}]},
  {grp:'기능', items:[{id:'__ledger__', label:'💰 가계부'}, {id:'__calendar__', label:'📅 캘린더'}]},
  {grp:'기록', items:[{id:'col:records', label:KNOWN.records}, {id:'col:signals', label:KNOWN.signals},
                      {id:'col:journals', label:KNOWN.journals}, {id:'col:conversations', label:KNOWN.conversations},
                      {id:'__collected__', label:'📍 활동 로그'}, {id:'__dismissed__', label:'🗂 확인함'}]},
  {grp:'설정', items:[{id:'__companion__', label:'🐾 동반자'}, {id:'__location__', label:'📡 위치·수집'},
                      {id:'__models__', label:'🧠 모델'}, {id:'__excludes__', label:'🔕 신호 제외'}]},
];

async function api(path, opts){
  const r = await fetch('/admin/api' + path, opts);
  if(!r.ok) throw new Error(r.status + ' ' + await r.text());
  return r.status === 204 ? null : r.json();
}
function go(id){ CUR=id; SKIP=0; Q=''; buildNav(); render(); }

async function loadStats(){
  try{ STATS = await api('/stats'); }catch(e){ STATS = {collections:[]}; }
  buildNav();
}
function colCount(name){ const c=(STATS&&STATS.collections||[]).find(x=>x.name===name); return c?c.count:''; }

function buildNav(){
  const shownCols = Object.keys(KNOWN);
  let html = '';
  for(const g of NAV){
    if(g.grp) html += `<div class="grp">${g.grp}</div>`;
    for(const it of g.items){
      const cnt = it.id.startsWith('col:') ? colCount(it.id.slice(4)) : '';
      html += `<div class="navi ${it.id===CUR?'on':''}" onclick="go('${it.id}')">
        <span>${it.label}</span>${cnt!==''?`<span class="c">${cnt}</span>`:''}</div>`;
    }
  }
  // 데이터(고급) — 기록에 없는 나머지 컬렉션
  const rest = (STATS&&STATS.collections||[]).filter(c=>!shownCols.includes(c.name));
  if(rest.length){
    html += `<div class="grp" style="cursor:pointer" onclick="DATAOPEN=!DATAOPEN;buildNav()">데이터 ${DATAOPEN?'▾':'▸'}</div>`;
    if(DATAOPEN) for(const c of rest){
      const id='col:'+c.name;
      html += `<div class="navi ${id===CUR?'on':''}" onclick="go('${id}')">
        <span style="font-size:12.5px">${c.label||c.name}</span><span class="c">${c.count}</span></div>`;
    }
  }
  if(STATS && STATS.unbriefed_signals>0){
    html += `<div style="padding:12px 18px;margin-top:8px;border-top:1px solid var(--hair)">
      <div class="hint" style="margin-bottom:7px">미요약 신호 ${STATS.unbriefed_signals}건</div>
      <button class="accent" onclick="rebrief(this)">지금 요약</button></div>`;
  }
  $('#nav').innerHTML = html;
  const tot = (STATS&&STATS.collections||[]).reduce((a,c)=>a+c.count,0);
  $('#brandsub').textContent = tot ? tot.toLocaleString()+' docs' : '어드민';
}
let DATAOPEN=false;

function crumb(group, title){
  $('#crumb').innerHTML = (group?`${group} &nbsp;›&nbsp; `:'') + `<b>${title}</b>`;
}

async function rebrief(btn){
  btn.disabled=true; btn.textContent='요약 중…';
  try{ const r=await api('/signals/rebrief',{method:'POST'});
    alert(`${r.briefed}건 요약 완료\n\n${r.summary||'(요약 없음)'}`);
    await loadStats(); render();
  }catch(e){ alert('실패: '+e.message); }
  btn.disabled=false; btn.textContent='지금 요약';
}

// ── 디스패치 ──
async function render(){
  const grpOf = id => (NAV.find(g=>g.items.some(i=>i.id===id))||{}).grp || '';
  if(CUR==='__home__'){ crumb('','홈'); return renderHome(); }
  if(CUR==='__ledger__'){ crumb('기능','가계부'); return renderLedger(); }
  if(CUR==='__calendar__'){ crumb('기능','캘린더'); return renderCalendar(); }
  if(CUR==='__collected__'){ crumb('기록','활동 로그'); return renderCollected(); }
  if(CUR==='__dismissed__'){ crumb('기록','확인함'); return renderDismissed(); }
  if(CUR==='__companion__'){ crumb('설정','동반자'); return renderCompanionPage(); }
  if(CUR==='__location__'){ crumb('설정','위치·수집'); return renderLocationPage(); }
  if(CUR==='__models__'){ crumb('설정','모델'); return renderModels(); }
  if(CUR==='__excludes__'){ crumb('설정','신호 제외'); return renderExcludes(); }
  if(CUR.startsWith('col:')){ const name=CUR.slice(4); crumb(grpOf(CUR)||'데이터', KNOWN[name]||name); return renderCollection(name); }
  renderHome();
}

// ══════════════════════════════════════════════════════════════
//  홈 — 오늘 한눈에
// ══════════════════════════════════════════════════════════════
async function renderHome(){
  const m=$('#main'); m.innerHTML='<div class="empty">로딩…</div>';
  const won=n=>(Number(n)||0).toLocaleString('ko')+'원';
  const safe=async(p,d)=>{ try{ return await (await fetch(p)).json(); }catch(e){ return d; } };
  const [led, cal, col, recs] = await Promise.all([
    safe('/ledger/settlement?period=month', {}),
    safe('/calendar/upcoming?days=7', {items:[]}),
    safe('/collector-status', null),
    api('/collection/records?limit=4').catch(()=>({docs:[]})),
  ]);
  const cards = [];
  // 가계부
  cards.push(`<div class="hc" onclick="go('__ledger__')">
    <div class="t">💰 이번 달 지출</div>
    <div class="kpi">${won(led.expense||0)}</div>
    <div class="sub">${(led.by_category||[]).slice(0,3).map(c=>c.name+' '+won(c.amount)).join(' · ')||'기록 없음'}${led.incomplete?` · <span style="color:var(--vermilion)">확인필요 ${led.incomplete}</span>`:''}</div></div>`);
  // 일정
  const evs=(cal.items||[]).slice(0,4);
  cards.push(`<div class="hc" onclick="go('__calendar__')">
    <div class="t">📅 다가오는 일정</div>
    ${evs.length?`<ul>${evs.map(e=>`<li>${e.all_day?'·':'•'} ${esc(e.title)}</li>`).join('')}</ul>`
      :`<div class="kpi" style="font-size:15px;color:var(--gray)">7일 내 일정 없음</div>`}</div>`);
  // 위치·수집기
  if(col){
    const place = col.visit_on && col.place ? esc(col.place) : (col.visit_on?'어딘가 체류':'이동/미확정');
    const fresh = col.age_sec!=null ? col.age_sec+'초 전' : '미상';
    cards.push(`<div class="hc" onclick="go('__location__')">
      <div class="t">📡 지금 위치 <span class="faint" style="margin-left:auto;font-size:11px">${fresh}</span></div>
      <div class="kpi" style="font-size:18px">${place}</div>
      <div class="sub">WiFi ${col.wifi?esc(col.wifi):'없음'} · 차 ${col.bt?'연결':'끊김'}${col.car_state?' · '+col.car_state:''}</div></div>`);
  }else{
    cards.push(`<div class="hc" onclick="go('__location__')"><div class="t">📡 수집기</div>
      <div class="kpi" style="font-size:15px;color:var(--gray)">아직 보고 없음</div></div>`);
  }
  // 최근 캡처
  const ds=(recs.docs||[]).slice(0,4);
  cards.push(`<div class="hc" onclick="go('col:records')">
    <div class="t">📸 최근 캡처</div>
    ${ds.length?`<ul>${ds.map(d=>`<li>${esc(summarize(d)).slice(0,40)}</li>`).join('')}</ul>`
      :`<div class="kpi" style="font-size:15px;color:var(--gray)">없음</div>`}</div>`);
  m.innerHTML = `<div class="bar"><h2>오늘 한눈에</h2><span class="total">${new Date().toLocaleDateString('ko',{month:'long',day:'numeric',weekday:'long'})}</span></div>
    <div class="cards">${cards.join('')}</div>`;
}

// ══════════════════════════════════════════════════════════════
//  기록 — 컬렉션 브라우저
// ══════════════════════════════════════════════════════════════
function fmtWhen(d){ if(!d) return ''; const t=new Date(d);
  return isNaN(t)?'':t.toLocaleString('ko',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function summarize(doc){ return doc.user_comment||doc.summary||doc.text||doc.body||
  (doc.insight&&doc.insight.text)||doc.date||doc.label||'—'; }

async function renderCollection(name){
  const m=$('#main'); m.innerHTML='<div class="empty">로딩…</div>';
  let data;
  try{ data=await api(`/collection/${name}?limit=50&skip=${SKIP}&q=${encodeURIComponent(Q)}`); }
  catch(e){ m.innerHTML=`<div class="empty">실패: ${e.message}</div>`; return; }
  const bar=`<div class="bar"><h2>${KNOWN[name]||name}</h2><span class="total">${data.total}건</span>
    <input type="search" placeholder="검색 (_id·본문·요약·발신인)" value="${esc(Q)}"
      onkeydown="if(event.key==='Enter'){Q=this.value;SKIP=0;render()}"></div>`;
  if(!data.docs.length){ m.innerHTML=bar+'<div class="empty">문서 없음</div>'; return; }
  const rows=data.docs.map(d=>{
    const id=d._id, when=fmtWhen(d.ts||d.period_start||d.last_ts);
    const otp=d.otp?'<span class="flag otp">OTP</span>':'';
    const br=(name==='signals'&&d.briefed===false)?'<span class="flag">미요약</span>':'';
    return `<div class="doc"><div class="head" onclick="toggle(this)">
      <span class="summary">${esc(summarize(d))}${otp}${br}</span><span class="when">${when}</span></div>
      <div class="body" hidden><pre>${esc(JSON.stringify(d,null,2))}</pre>
        <div class="actions"><span class="id">${id}</span>
          <button class="danger" onclick="delDoc('${name}','${id}',event)">삭제</button></div></div></div>`;
  }).join('');
  const shown=SKIP+data.docs.length, n=[];
  if(SKIP>0) n.push(`<button onclick="SKIP=Math.max(0,SKIP-50);render()">← 이전</button>`);
  if(shown<data.total) n.push(`<button onclick="SKIP+=50;render()">다음 →</button>`);
  const more=n.length?`<div style="text-align:center;margin:16px 0" class="hint">${SKIP+1}–${shown} / ${data.total} &nbsp; ${n.join(' ')}</div>`:'';
  m.innerHTML=bar+rows+more;
}
function toggle(head){ const b=head.parentElement.querySelector('.body'); b.hidden=!b.hidden; }
async function delDoc(name,id,ev){ ev.stopPropagation();
  if(!confirm(`삭제할까요?\n${id}`)) return;
  try{ await api(`/collection/${name}/${encodeURIComponent(id)}`,{method:'DELETE'}); await loadStats(); render(); }
  catch(e){ alert('삭제 실패: '+e.message); }
}

// ══════════════════════════════════════════════════════════════
//  설정: 동반자 (페르소나 + 말 걸기 탭)
// ══════════════════════════════════════════════════════════════
let CTAB='personas';
function renderCompanionPage(){
  const m=$('#main');
  m.innerHTML=`<div class="bar"><h2>동반자</h2><span class="total">베르·쿠키 — 말투·역할(페르소나)과 먼저 거는 말(말 걸기)</span></div>
    <div class="tabs">
      <div class="tab ${CTAB==='personas'?'on':''}" onclick="CTAB='personas';renderCompanionPage()">페르소나</div>
      <div class="tab ${CTAB==='speak'?'on':''}" onclick="CTAB='speak';renderCompanionPage()">말 걸기</div>
    </div><div id="sub"><div class="empty">로딩…</div></div>`;
  if(CTAB==='personas') renderPersonas($('#sub')); else renderCompanion($('#sub'));
}

async function renderPersonas(host){
  const m=host||$('#main'); m.innerHTML='<div class="empty">로딩…</div>';
  let d; try{ d=await api('/personas'); }catch(e){ m.innerHTML=`<div class="empty">실패: ${e.message}</div>`; return; }
  m.innerHTML=d.fields.map(f=>`<div class="pf">
    <label>${f.label} ${f.overridden?'<span class="flag">수정됨</span>':''}</label>
    <textarea data-key="${f.key}">${esc(f.value)}</textarea>
    <div class="row"><button class="accent" onclick="savePersona('${f.key}',this)">저장</button>
      ${f.overridden?`<button onclick="resetPersona('${f.key}')">디폴트로</button>`:''}
      <span class="hint">${f.key}</span></div></div>`).join('');
}
async function savePersona(key,btn){
  const ta=btn.closest('.pf').querySelector('textarea'); btn.disabled=true;
  try{ await api('/personas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,value:ta.value})});
    renderPersonas(btn.closest('#sub')||$('#main')); }
  catch(e){ alert('저장 실패: '+e.message); btn.disabled=false; }
}
async function resetPersona(key){ if(!confirm('디폴트로 되돌릴까요?')) return;
  try{ await api('/personas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,value:''})});
    renderPersonas($('#sub')); }catch(e){ alert('실패: '+e.message); }
}

function numField(key,val,label,suffix){
  return `<label style="display:flex;align-items:center;gap:8px;font-weight:400;margin:0">
    <span style="min-width:96px">${label}</span>
    <input type="number" min="0" data-k="${key}" value="${val}"
      style="width:74px;padding:6px 8px;border:1px solid var(--hair);border-radius:6px;font:inherit">
    <span class="hint" style="margin:0">${suffix||''}</span></label>`;
}
function chkField(key,on,label){
  return `<label style="display:inline-flex;align-items:center;gap:6px;font-weight:400;margin:0 14px 8px 0">
    <input type="checkbox" data-k="${key}" ${on?'checked':''}> ${label}</label>`;

const KIND_LABEL={home:'집',office:'작업실',place:'장소'};
async function places(path,opts){ const r=await fetch('/places'+(path||''),opts); if(!r.ok) throw new Error(r.status+' '+await r.text()); return r.json(); }
async function locCfg(opts){ const r=await fetch('/location-config',opts); if(!r.ok) throw new Error(r.status+' '+await r.text()); return r.json(); }
async function collStatus(){ const r=await fetch('/collector-status'); if(!r.ok) throw new Error(r.status); return r.json(); }
const inStyle='width:100%;padding:8px 10px;border:1px solid var(--hair);border-radius:7px;font:inherit;background:#FCFBF9;margin-bottom:8px';

async function renderPlaces(host){

  try{ d=await places(); lc=(await locCfg()).config; }catch(e){ m.innerHTML=`<div class="empty">실패: ${e.message}</div>`; return; }

      위치: <b>${place}</b> · 차 BT: <b>${st.bt?esc(st.bt)+' 연결됨':'끊김'}</b>${(st.lat!=null&&st.lng!=null)?` · GPS <a href="https://maps.google.com/?q=${st.lat},${st.lng}" target="_blank">${st.lat.toFixed(5)}, ${st.lng.toFixed(5)} 🗺</a>`:''}</div>`:''}

    ${chkField('skip_on_known_wifi',lc.skip_on_known_wifi!==false,'등록 WiFi에 물려 있으면 GPS 스킵(배터리 절약)')}

  const add=`<div class="pf"><label>장소 추가</label>
    <input id="npName" placeholder="이름 (예: 단골 카페)" style="${inStyle}">
    <input id="npWifi" placeholder="WiFi (여러 개는 쉼표 — 하나라도 잡히면 여기)" style="${inStyle}">
    <input id="npBt" placeholder="블루투스 기기명 (쉼표) · 선택" style="${inStyle}">
    <textarea id="npDesc" placeholder="설명 — 동반자가 맥락으로 씀" style="${inStyle};min-height:52px;font-family:inherit"></textarea>
    <div class="row"><button class="accent" onclick="addPlace(this)">추가</button></div></div>`;
  const rows=items.length?items.map(p=>`<div class="pf" data-id="${p.id}" data-name="${esc(p.name)}">
    <label>${KIND_LABEL[p.kind]||p.kind} <span class="hint">${coords(p)}</span></label>
    <input data-name value="${esc(p.name)}" style="${inStyle}">

    <input data-bt value="${esc((p.bts||[]).join(', '))}" placeholder="BT (쉼표, OR)" style="${inStyle}">
    <textarea data-desc placeholder="설명" style="${inStyle};min-height:50px;font-family:inherit">${esc(p.description||'')}</textarea>
    <div class="row"><button class="accent" onclick="savePlace('${p.id}',this)">저장</button>
      ${curWifi?`<button data-wc="${esc(curWifi)}" onclick="registerWifi('${p.id}',this)">현재 WiFi 추가</button>`:''}
      <button class="danger" onclick="delPlace('${p.id}')">삭제</button></div></div>`).join('')
    : '<div class="empty">등록된 장소 없음 — 위에서 추가</div>';
  m.innerHTML=status+sensing+add+rows;

async function saveSensing(btn){
  const patch={};
  ($('#sub')||document).querySelectorAll('[data-k]').forEach(el=>{ const k=el.dataset.k;
    if(!['poll_interval_sec','skip_on_known_wifi'].includes(k)) return;
    patch[k]=el.type==='checkbox'?el.checked:Number(el.value); });
  btn.disabled=true;
  try{ await locCfg({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});
    btn.textContent='저장됨 ✓'; setTimeout(()=>{btn.textContent='위치 확인 저장';btn.disabled=false;},1200);
  }catch(e){ alert('저장 실패: '+e.message); btn.disabled=false; }
}
const splitList=v=>(v||'').split(',').map(s=>s.trim()).filter(Boolean);
async function addPlace(btn){
  const name=document.getElementById('npName').value.trim();
  if(!name){ alert('이름을 적어주세요'); return; }
  btn.disabled=true;
  try{ await places('',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    name, wifis:splitList(document.getElementById('npWifi').value), bts:splitList(document.getElementById('npBt').value),
    description:document.getElementById('npDesc').value, kind:'place'})}); renderPlaces($('#sub')); }
  catch(e){ alert('추가 실패: '+e.message); btn.disabled=false; }
}
async function savePlace(id,btn){
  const pf=btn.closest('.pf');
  const name=(pf.querySelector('[data-name]')||{value:''}).value.trim()||pf.dataset.name;
  btn.disabled=true;
  try{ await places('',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    id, name, description:pf.querySelector('[data-desc]').value,
    wifis:splitList((pf.querySelector('[data-wifi]')||{value:''}).value), bts:splitList((pf.querySelector('[data-bt]')||{value:''}).value)})});
    btn.textContent='저장됨 ✓'; setTimeout(()=>{btn.textContent='저장';btn.disabled=false;},1200);
  }catch(e){ alert('저장 실패: '+e.message); btn.disabled=false; }
}
async function registerWifi(id,btn){
  const wifi=btn.dataset.wc; if(!wifi) return;
  const pf=btn.closest('.pf');
  if(!confirm('현재 WiFi "'+wifi+'"를 \''+pf.dataset.name+'\'에 추가할까요?')) return;
  const wifis=splitList((pf.querySelector('[data-wifi]')||{value:''}).value);
  if(!wifis.includes(wifi)) wifis.push(wifi);
  btn.disabled=true;
  try{ await places('',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,name:pf.dataset.name,wifis})}); renderPlaces($('#sub')); }
  catch(e){ alert('추가 실패: '+e.message); btn.disabled=false; }
}

function fmtEvent(e){ if(!e.start) return ''; const d=new Date(e.start); if(isNaN(d)) return e.start;
  return e.all_day?d.toLocaleDateString('ko',{month:'numeric',day:'numeric',weekday:'short'})
    :d.toLocaleString('ko',{month:'numeric',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'}); }
async function renderCalendar(){

      :'<div class="empty">앞으로 14일 일정 없음</div>';

      <div class="hint" style="margin-top:3px">카톡·문자·포스터·초대장 등 (여러 일정·연속 투입 OK)</div>
      <div id="calmsg" class="hint" style="margin-top:6px"></div></div>`;
    body=`<div class="hint" style="margin-bottom:10px">연동됨 ✓ ${esc(st.account||st.calendar_id||'')}</div>`+drop+rows;
  }else{
    const step=st.has_client?`클라이언트 파일은 준비됨. <b>scripts/gcal_auth.py</b>만 실행.`:`아직 OAuth 클라이언트(<b>gcal_credentials.json</b>) 없음.`;

      1. Google Cloud Console → ‘Google Calendar API’ 사용<br>
      2. OAuth 동의화면 + 클라이언트 ID(데스크톱 앱) → JSON 다운로드<br>

async function saveLocLabel(kind,id,inputId,lat,lng){
  const el=document.getElementById(inputId); const name=(el.value||'').trim();

  el.disabled=true;

  catch(e){ alert('저장 실패: '+e.message); el.disabled=false; }

async function toggleErr(kind,id,val){
  try{ await fetch('/locations/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind,id,error:val==='true'||val===true})}); renderCollected(); }
  catch(e){ alert('실패: '+e.message); }
}
async function editCoords(kind,id,lat,lng){
  const v=prompt('새 좌표 (위도,경도)', (lat!=null&&lng!=null)?lat+','+lng:'');
  if(v==null) return;
  const mm=v.split(',').map(s=>parseFloat(s.trim()));
  if(mm.length!==2||isNaN(mm[0])||isNaN(mm[1])){ alert('형식: 위도,경도 (예: 37.5,127.0)'); return; }
  try{ await fetch('/locations/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind,id,lat:mm[0],lng:mm[1]})}); renderCollected(); }
  catch(e){ alert('실패: '+e.message); }
}
async function delLoc(kind,id){ if(!confirm('이 기록을 삭제할까요?')) return;
  try{ await fetch('/locations/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind,id})}); renderCollected(); }
  catch(e){ alert('삭제 실패: '+e.message); }
}

// ── 드롭 큐 (영수증·캘린더 공용) — 여러 파일·연속 투입을 하나씩 순차 ──
const DROPQ={items:[],busy:false};
function enqueueDrop(job){ DROPQ.items.push(job); if(!DROPQ.busy) runDropQueue(); }
async function runDropQueue(){
  DROPQ.busy=true; let lastAfter=null;
  while(DROPQ.items.length){
    const job=DROPQ.items[0], msg=document.getElementById(job.msgEl), remain=DROPQ.items.length-1;
    if(msg) msg.textContent=`처리 중: ${job.file.name}${remain?` · 대기 ${remain}건`:''}`;
    let line;
    try{ const fd=new FormData(); fd.append('file',job.file);
      const r=await(await fetch(job.url,{method:'POST',body:fd})).json(); line=job.done(r,job.file);
    }catch(err){ line=`✗ ${job.file.name}: ${err.message}`; }
    DROPQ.items.shift(); lastAfter=job.after;
    const m2=document.getElementById(job.msgEl);
    if(m2) m2.textContent=line+(DROPQ.items.length?` · 대기 ${DROPQ.items.length}건`:'');
  }
  DROPQ.busy=false; if(lastAfter) setTimeout(lastAfter,1600);
}

}
async function fillLedger(id){
  const el=document.getElementById('mc-'+id), v=(el.value||'').trim();
  if(!v) return; el.disabled=true;
  try{ await fetch('/ledger/'+encodeURIComponent(id),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({merchant:v})}); renderLedger(); }
  catch(e){ alert('저장 실패: '+e.message); el.disabled=false; }
}
async function entryReceipt(id,input){
  const file=input.files&&input.files[0]; if(!file) return;
  const fd=new FormData(); fd.append('file',file);
  try{ await fetch('/ledger/'+encodeURIComponent(id)+'/receipt',{method:'POST',body:fd}); renderLedger(); }
  catch(e){ alert('영수증 처리 실패: '+e.message); }
}
function toggleDetail(id){ const d=document.getElementById('det-'+id), cv=document.getElementById('cv-'+id);
  if(!d) return; const open=d.style.display==='none'; d.style.display=open?'table-row':'none'; if(cv) cv.textContent=open?'▾':'▸'; }
function lightbox(src){ let o=document.getElementById('lbx');
  if(!o){ o=document.createElement('div'); o.id='lbx';
    o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out';
    o.onclick=()=>o.remove(); document.body.appendChild(o); }
  o.innerHTML='<img src="'+src+'" style="max-width:92vw;max-height:92vh;box-shadow:0 4px 36px rgba(0,0,0,.5)">'; }
async function resolveDiff(id,amount){
  const amt=parseInt(amount,10); if(!amt||amt<=0){ alert('금액을 확인하세요'); return; }
  try{ await fetch('/ledger/'+encodeURIComponent(id)+'/amount',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:amt})}); renderLedger(); }
  catch(e){ alert('확정 실패: '+e.message); }
}

// ── 공통 ──
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

(async function init(){ await loadStats(); render(); })();
</script>

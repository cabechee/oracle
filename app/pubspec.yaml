name: oracle
description: "Oracle — 일상 디스커버리 채팅 동반자 + 비서"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  intl: ^0.20.2
  flutter_markdown: ^0.7.4
  shared_preferences: ^2.3.3
  camera: ^0.11.0
  permission_handler: ^11.3.1
  record: ^7.0.0
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  receive_sharing_intent: ^1.8.1
  flutter_local_notifications: ^17.2.4
  another_telephony: ^0.4.1
  call_log: ^6.0.1
  workmanager: ^0.9.0+3
  notification_listener_service: ^0.3.5
  health: ^13.3.1
  android_intent_plus: ^6.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
    - family: GowunBatang
      fonts:
        - asset: assets/fonts/GowunBatang-Regular.ttf
        - asset: assets/fonts/GowunBatang-Bold.ttf
          weight: 700
    - family: Literata
      fonts:
        - asset: assets/fonts/Literata-Variable.ttf
    - family: PhosphorThin
      fonts:
        - asset: assets/fonts/Phosphor-Thin.ttf
